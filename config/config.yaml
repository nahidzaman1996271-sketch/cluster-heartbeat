project:
  name: cluster-heartbeat
  version: "0.1.0"

paths:
  raw_data_dir: "data_store/raw"
  processed_data_dir: "data_store/processed"
  checkpoint_dir: "checkpoints"
  log_dir: "logs"

data:
  synthetic:
    num_gpus: 32
    num_days: 7
    sample_interval_seconds: 60
    failure_rate: 0.03          # fraction of GPUs that experience a failure ramp
  prometheus:
    base_url: "http://localhost:9090"
    dcgm_job: "dcgm-exporter"
    query_step: "60s"

features:
  sliding_window:
    window_size: 30             # timesteps per window
    stride: 5
  columns:
    - gpu_util
    - mem_util
    - gpu_temp
    - power_watts
    - ecc_errors
    - xid_errors
    - cpu_util
    - ram_util
    - net_throughput_mbps
    - disk_io_mbps
    - job_runtime_s
    - queue_length
    - active_processes

model:
  autoencoder:
    input_dim: 13
    hidden_dims: [64, 32, 16]
    latent_dim: 8
    lr: 0.001
    epochs: 30
    batch_size: 64
  pca:
    n_components: 8
  anomaly_detector:
    method: "reconstruction_error"   # or "isolation_forest"
    contamination: 0.03
  workload_classifier:
    num_classes: 4                   # idle, light, steady, bursty
    hidden_dim: 32
    lr: 0.001
    epochs: 25
    batch_size: 64
  demand_predictor:
    lookback: 12
    horizon: 6
    hidden_dim: 64
    num_layers: 2
    lr: 0.001
    epochs: 25
    batch_size: 64

scoring:
  health_score_weights:
    anomaly: 0.35
    ecc_xid: 0.25
    thermal: 0.20
    utilization_stability: 0.20
  failure_risk_thresholds:
    low: 0.33
    medium: 0.66

api:
  host: "0.0.0.0"
  port: 8000
