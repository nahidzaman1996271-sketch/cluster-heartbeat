# ============================================
# LOGGING CONFIGURATION
# ============================================

version: 1
disable_existing_loggers: false

formatters:
  json:
    format: '{"timestamp":"%(asctime)s","level":"%(levelname)s","name":"%(name)s","module":"%(module)s","function":"%(funcName)s","line":%(lineno)d,"message":"%(message)s"}'
    datefmt: '%Y-%m-%dT%H:%M:%S%z'
  
  text:
    format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
    datefmt: '%Y-%m-%d %H:%M:%S'

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: text
    stream: ext://sys.stdout
  
  file:
    class: logging.handlers.RotatingFileHandler
    level: DEBUG
    formatter: json
    filename: logs/app.log
    maxBytes: 10485760
    backupCount: 10
  
  error_file:
    class: logging.handlers.RotatingFileHandler
    level: ERROR
    formatter: json
    filename: logs/error.log
    maxBytes: 10485760
    backupCount: 10

loggers:
  cluster_heartbeat:
    level: INFO
    handlers: [console, file]
    propagate: false
  
  cluster_heartbeat.api:
    level: INFO
    handlers: [console, file]
    propagate: false
  
  cluster_heartbeat.models:
    level: INFO
    handlers: [console, file]
    propagate: false
  
  cluster_heartbeat.data:
    level: INFO
    handlers: [console, file]
    propagate: false

root:
  level: WARNING
  handlers: [console, error_file]