version: '3.8'

# ============================================
# CLUSTER HEARTBEAT - Docker Compose Configuration
# ============================================

services:
  # ==========================================
  # MAIN API SERVICE
  # ==========================================
  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - PYTHON_VERSION=3.9
        - REQUIREMENTS_FILE=requirements.txt
    container_name: cluster-heartbeat-api
    image: cluster-heartbeat:latest
    
    # Port mapping
    ports:
      - "8000:8000"  # API endpoint
      - "8001:8001"  # Debug/Admin (optional)
    
    # Environment variables
    environment:
      - PYTHONPATH=/app
      - CONFIG_PATH=/app/config/config.yaml
      - LOG_LEVEL=INFO
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - ENVIRONMENT=production
      - PYTHONUNBUFFERED=1
      - TZ=UTC
    
    # Volume mounts
    volumes:
      # Configuration
      - ./config:/app/config:ro
      
      # Models and checkpoints
      - ./models_checkpoints:/app/models_checkpoints
      
      # Logs
      - ./logs:/app/logs
      
      # Data directories
      - ./data:/app/data
      - ./data/raw:/app/data/raw
      - ./data/processed:/app/data/processed
      - ./data/cache:/app/data/cache
      
      # Development (optional - uncomment for hot reload)
      # - ./src:/app/src
    
    # Resources
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G
    
    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    # Restart policy
    restart: unless-stopped
    
    # Dependencies
    depends_on:
      - prometheus
      - grafana
    
    # Networks
    networks:
      - cluster-heartbeat-network
    
    # Command
    command: ["python", "-m", "src.main", "--mode", "api"]

  # ==========================================
  # GRAFANA DASHBOARD
  # ==========================================
  grafana:
    image: grafana/grafana:latest
    container_name: cluster-heartbeat-grafana
    
    ports:
      - "3000:3000"  # Grafana UI
    
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=grafana-piechart-panel,grafana-worldmap-panel
      - GF_SERVER_ROOT_URL=http://localhost:3000
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    
    volumes:
      # Grafana data persistence
      - grafana-data:/var/lib/grafana
      
      # Dashboards provisioning
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      
      # Custom dashboards
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      
      # Grafana configuration
      - ./grafana/grafana.ini:/etc/grafana/grafana.ini:ro
    
    restart: unless-stopped
    depends_on:
      - prometheus
    networks:
      - cluster-heartbeat-network

  # ==========================================
  # PROMETHEUS METRICS
  # ==========================================
  prometheus:
    image: prom/prometheus:latest
    container_name: cluster-heartbeat-prometheus
    
    ports:
      - "9090:9090"  # Prometheus UI
    
    volumes:
      # Prometheus configuration
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      
      # Prometheus data persistence
      - prometheus-data:/prometheus
      
      # Alert rules (optional)
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
    
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
      - '--storage.tsdb.retention.time=15d'
    
    restart: unless-stopped
    networks:
      - cluster-heartbeat-network

  # ==========================================
  # NVIDIA DCGM EXPORTER (Optional - for GPU monitoring)
  # ==========================================
  dcgm-exporter:
    image: nvidia/dcgm-exporter:latest
    container_name: cluster-heartbeat-dcgm
    restart: unless-stopped
    
    # Requires NVIDIA runtime
    runtime: nvidia
    
    environment:
      - DCGM_EXPORTER_PORT=9400
      - DCGM_EXPORTER_LISTEN=0.0.0.0:9400
      - DCGM_EXPORTER_COLLECT_INTERVAL=5000
    
    volumes:
      - /usr/local/dcgm:/usr/local/dcgm
      - /run/nvidia-dcgm:/run/nvidia-dcgm
    
    ports:
      - "9400:9400"  # DCGM metrics
    
    depends_on:
      - prometheus
    
    networks:
      - cluster-heartbeat-network
    
    # Only run if NVIDIA GPU is available
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # ==========================================
  # TRAINING SERVICE (Optional - for batch training)
  # ==========================================
  training:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cluster-heartbeat-training
    
    environment:
      - PYTHONPATH=/app
      - CONFIG_PATH=/app/config/config.yaml
      - LOG_LEVEL=INFO
    
    volumes:
      - ./config:/app/config:ro
      - ./models_checkpoints:/app/models_checkpoints
      - ./data:/app/data
      - ./logs:/app/logs
    
    profiles:
      - training
    
    networks:
      - cluster-heartbeat-network
    
    command: ["python", "-m", "src.training.train", "--config", "/app/config/config.yaml", "--output-dir", "/app/models_checkpoints"]

  # ==========================================
  # JUPYTER NOTEBOOK (Optional - for development)
  # ==========================================
  jupyter:
    image: jupyter/datascience-notebook:latest
    container_name: cluster-heartbeat-jupyter
    
    ports:
      - "8888:8888"  # Jupyter UI
    
    volumes:
      - ./notebooks:/home/jovyan/notebooks
      - ./data:/home/jovyan/data
      - ./src:/home/jovyan/src
      - ./config:/home/jovyan/config
    
    environment:
      - JUPYTER_ENABLE_LAB=yes
      - GRANT_SUDO=yes
      - JUPYTER_TOKEN=cluster-heartbeat
      - PYTHONPATH=/home/jovyan
    
    profiles:
      - jupyter
    
    networks:
      - cluster-heartbeat-network
    
    command: ["start-notebook.sh", "--NotebookApp.token=cluster-heartbeat"]

  # ==========================================
  # REDIS CACHE (Optional - for caching)
  # ==========================================
  redis:
    image: redis:alpine
    container_name: cluster-heartbeat-redis
    
    ports:
      - "6379:6379"
    
    volumes:
      - redis-data:/data
    
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-cluster-heartbeat}
    
    profiles:
      - redis
    
    networks:
      - cluster-heartbeat-network

  # ==========================================
  # NGINX REVERSE PROXY (Optional - for production)
  # ==========================================
  nginx:
    image: nginx:alpine
    container_name: cluster-heartbeat-nginx
    
    ports:
      - "80:80"       # HTTP
      - "443:443"     # HTTPS
    
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    
    depends_on:
      - api
    
    profiles:
      - production
    
    networks:
      - cluster-heartbeat-network

# ============================================
# VOLUMES
# ============================================
volumes:
  grafana-data:
    driver: local
    name: cluster-heartbeat-grafana-data
  
  prometheus-data:
    driver: local
    name: cluster-heartbeat-prometheus-data
  
  redis-data:
    driver: local
    name: cluster-heartbeat-redis-data

# ============================================
# NETWORKS
# ============================================
networks:
  cluster-heartbeat-network:
    driver: bridge
    name: cluster-heartbeat-network
    ipam:
      config:
        - subnet: 172.20.0.0/16
          gateway: 172.20.0.1